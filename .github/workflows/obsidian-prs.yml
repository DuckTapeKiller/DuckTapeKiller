name: Update Obsidian PR Status

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: DuckTapeKiller
        run: python .github/scripts/obsidian_prs.py

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update obsidian PR status'
